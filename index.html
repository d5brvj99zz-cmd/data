<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>資産管理 - Simple Asset</title>
    <style>
        :root {
            --bg-color: #F8F9FB;
            --card-bg: #FFFFFF;
            --text-main: #2D3436;
            --color-income: #00B894; /* 爽やかなグリーン */
            --color-expense: #B2BEC3; /* 控えめなグレー */
            --shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 500px; margin: 0 auto; }
        
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
        
        /* ドーナツグラフ */
        .chart-wrapper { display: flex; justify-content: center; position: relative; height: 200px; align-items: center; }
        .donut { width: 180px; height: 180px; border-radius: 50%; background: conic-gradient(var(--color-income) 0%, var(--color-expense) 0%); transition: 0.5s; }
        .hole { position: absolute; width: 130px; height: 130px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; background: #F0F2F5; font-size: 16px; box-sizing: border-box; }
        button { background: var(--color-income); color: white; font-weight: bold; }
        
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #EEE; }
        .empty { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="chart-wrapper">
            <div id="donut" class="donut"></div>
            <div class="hole" onclick="toggleMask()">
                <small>総資産</small>
                <div id="totalValue" style="font-weight: bold; font-size: 1.2rem;">¥0</div>
            </div>
        </div>
    </div>

    <div class="card">
        <input type="text" id="name" placeholder="項目名">
        <input type="number" id="amount" placeholder="金額">
        <select id="type"><option value="income">収入</option><option value="expense">支出</option></select>
        <button onclick="saveData()">登録</button>
    </div>

    <div class="card">
        <div id="list"></div>
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('myAssets')) || [];
    let masked = false;

    function saveData() {
        const name = document.getElementById('name').value;
        const amount = parseInt(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        
        if(name && amount) {
            items.push({ name, amount, type });
            localStorage.setItem('myAssets', JSON.stringify(items));
            update();
        }
    }

    function toggleMask() { masked = !masked; update(); }

    function update() {
        const listEl = document.getElementById('list');
        const donut = document.getElementById('donut');
        let total = 0, income = 0, expense = 0;

        listEl.innerHTML = '';
        items.forEach((item, i) => {
            if(item.type === 'income') { total += item.amount; income += item.amount; }
            else { total -= item.amount; expense += item.amount; }
            
            listEl.innerHTML += `
                <div class="list-item">
                    <span>${item.name} (${item.type === 'income' ? '収入' : '支出'})</span>
                    <span>¥${item.amount.toLocaleString()} <button style="width:auto; padding:2px 8px; background:none; color:gray;" onclick="del(${i})">✕</button></span>
                </div>
            `;
        });

        document.getElementById('totalValue').innerText = masked ? '***' : '¥' + total.toLocaleString();
        
        const totalSum = income + expense;
        const incRatio = totalSum === 0 ? 0 : (income / totalSum) * 100;
        donut.style.background = `conic-gradient(var(--color-income) ${incRatio}%, var(--color-expense) 0)`;
        
        if(items.length === 0) listEl.innerHTML = '<div class="empty">データがありません</div>';
    }

    function del(i) { items.splice(i, 1); localStorage.setItem('myAssets', JSON.stringify(items)); update(); }
    
    update();
</script>
</body>
</html>
